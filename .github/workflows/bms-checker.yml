name: BMS Ticket Checker

on:
  schedule:
    - cron: '*/30 * * * *'   # runs every 30 minutes
  workflow_dispatch:

jobs:
  check-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python (uv)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      # Install dependencies directly (no requirements.txt needed)
      - name: Install dependencies
        run: uv pip install playwright requests beautifulsoup4

      # Required for Playwright
      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - name: Run BMS Ticket Checker
        env:
          BMS_URL: ${{ secrets.BMS_URL }}
          BMS_DATES: ${{ secrets.BMS_DATES }}
          BMS_THEATRE: ${{ secrets.BMS_THEATRE }}
          BMS_TIME: ${{ secrets.BMS_TIME }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
        run: uv run main.py
