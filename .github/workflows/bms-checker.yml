name: BMS Ticket Checker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Run BMS Ticket Checker
        env:
          BMS_URL: ${{ secrets.BMS_URL }}
          BMS_DATES: ${{ secrets.BMS_DATES }}
          BMS_THEATRE: ${{ secrets.BMS_THEATRE }}
          BMS_TIME: ${{ secrets.BMS_TIME }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
        run: uv run main.py
